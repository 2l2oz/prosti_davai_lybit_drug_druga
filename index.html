<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Прости меня</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;500;700&family=Marck+Script&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { height: 100%; }

  body {
    font-family: 'Comfortaa', sans-serif;
    background: linear-gradient(135deg, #ffd6e8 0%, #ffe9f2 40%, #fff0f6 70%, #ffe3ec 100%);
    background-size: 400% 400%;
    animation: gradientShift 18s ease infinite;
    overflow-x: hidden;
    min-height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    color: #6b2c45;
  }

  @keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  /* Слой для летящих сердечек и стикеров */
  #floating {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 1;
  }

  .heart, .kiss {
    position: absolute;
    bottom: -60px;
    user-select: none;
    will-change: transform, opacity;
    opacity: 0;
  }

  .heart {
    font-size: 26px;
    animation: floatUp linear forwards;
  }

  .kiss {
    font-size: 34px;
    animation: floatUp linear forwards;
  }

  @keyframes floatUp {
    0%   { transform: translateY(0) translateX(0) rotate(0deg) scale(0.6); opacity: 0; }
    10%  { opacity: 0.95; }
    50%  { transform: translateY(-50vh) translateX(var(--sway)) rotate(20deg) scale(1); }
    90%  { opacity: 0.9; }
    100% { transform: translateY(-110vh) translateX(calc(var(--sway) * -1)) rotate(-15deg) scale(1.1); opacity: 0; }
  }

  /* Главная карточка */
  .card {
    position: relative;
    z-index: 2;
    max-width: 620px;
    width: 90%;
    margin: 40px 20px;
    padding: 56px 40px;
    text-align: center;
    background: rgba(255, 255, 255, 0.55);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(255, 255, 255, 0.7);
    border-radius: 36px;
    box-shadow: 0 20px 60px rgba(214, 110, 150, 0.35);
    animation: cardIn 1.4s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  @keyframes cardIn {
    0% { opacity: 0; transform: translateY(40px) scale(0.92); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }

  .big-heart {
    font-size: 72px;
    display: inline-block;
    animation: beat 1.3s ease-in-out infinite;
    filter: drop-shadow(0 8px 16px rgba(255, 120, 160, 0.5));
  }

  @keyframes beat {
    0%, 100% { transform: scale(1); }
    15% { transform: scale(1.18); }
    30% { transform: scale(1); }
    45% { transform: scale(1.12); }
  }

  h1 {
    font-family: 'Marck Script', cursive;
    font-size: clamp(34px, 7vw, 56px);
    line-height: 1.25;
    margin: 24px 0 18px;
    color: #d6427a;
    text-shadow: 0 2px 10px rgba(255, 170, 200, 0.6);
    animation: shimmer 4s ease-in-out infinite;
  }

  @keyframes shimmer {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.85; }
  }

  .subtitle {
    font-size: clamp(15px, 3.5vw, 18px);
    line-height: 1.8;
    font-weight: 400;
    color: #8a4566;
    margin-bottom: 30px;
  }

  .subtitle strong { color: #d6427a; font-weight: 700; }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    border: none;
    cursor: pointer;
    font-family: 'Comfortaa', sans-serif;
    font-weight: 700;
    font-size: 17px;
    color: #fff;
    padding: 16px 34px;
    border-radius: 50px;
    background: linear-gradient(135deg, #ff7eb3, #ff5e9c);
    box-shadow: 0 10px 25px rgba(255, 94, 156, 0.45);
    transition: transform 0.25s ease, box-shadow 0.25s ease;
  }

  .btn:hover {
    transform: translateY(-3px) scale(1.04);
    box-shadow: 0 16px 34px rgba(255, 94, 156, 0.55);
  }

  .btn:active { transform: scale(0.97); }

  .secret {
    margin-top: 26px;
    font-size: 16px;
    line-height: 1.7;
    color: #b14b78;
    min-height: 26px;
    font-weight: 500;
    opacity: 0;
    transition: opacity 0.6s ease;
  }

  .secret.show { opacity: 1; }

  .footer-hearts {
    margin-top: 30px;
    font-size: 22px;
    letter-spacing: 8px;
  }

  /* === Адаптация под телефон === */
  @media (max-width: 600px) {
    .card {
      width: 92%;
      margin: 24px 14px;
      padding: 40px 22px;
      border-radius: 28px;
    }
    .big-heart { font-size: 60px; }
    h1 { margin: 18px 0 14px; }
    .subtitle { line-height: 1.7; margin-bottom: 24px; }
    .btn { font-size: 16px; padding: 15px 28px; width: 100%; justify-content: center; }
    .secret { font-size: 15px; }
    .footer-hearts { letter-spacing: 6px; }
  }

  @media (max-width: 360px) {
    .card { padding: 32px 16px; }
    .big-heart { font-size: 52px; }
  }

  /* Убираем серую подсветку при касании на мобильных */
  .btn { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }

  /* Уважаем настройку «меньше анимации» */
  @media (prefers-reduced-motion: reduce) {
    body { animation: none; }
    .big-heart { animation: none; }
  }
</style>
</head>
<body>
  <div id="floating"></div>

  <main class="card">
    <span class="big-heart">💗</span>
    <h1>Прости меня за всё</h1>
    <p class="subtitle">Ты мне очень <strong>важна</strong> и <strong>дорога</strong>.<br>Каждую минуту я думаю о тебе и хочу,<br>чтобы между нами снова была только нежность.</p>
    <button class="btn" id="loveBtn">Нажми меня 💋</button>
    <p class="secret" id="secret"></p>
    <div class="footer-hearts">💕 💞 💖</div>
  </main>

<script>
  const floating = document.getElementById('floating');
  const symbols = ['❤️','💕','💗','💖','💝','💞','🌸','💋'];
  const kisses = ['💋','😘'];

  function spawn(isKiss) {
    const el = document.createElement('div');
    el.className = isKiss ? 'kiss' : 'heart';
    el.textContent = isKiss
      ? kisses[Math.floor(Math.random() * kisses.length)]
      : symbols[Math.floor(Math.random() * symbols.length)];
    const startX = Math.random() * 100;
    el.style.left = startX + 'vw';
    const duration = 6 + Math.random() * 6;
    el.style.animationDuration = duration + 's';
    el.style.fontSize = (isKiss ? 28 + Math.random() * 22 : 18 + Math.random() * 22) + 'px';
    el.style.setProperty('--sway', (Math.random() * 120 - 60) + 'px');
    floating.appendChild(el);
    setTimeout(() => el.remove(), duration * 1000 + 200);
  }

  // Постоянный поток летящих сердечек
  setInterval(() => spawn(false), 380);
  // Время от времени — стикеры с поцелуями
  setInterval(() => spawn(true), 1400);

  // Небольшой стартовый залп
  for (let i = 0; i < 14; i++) {
    setTimeout(() => spawn(Math.random() < 0.3), i * 120);
  }

  // Кнопка с нежными признаниями + взрыв поцелуев
  const messages = [
    'Ты - моё самое тёплое чувство 💗',
    'Мне очень жаль, что я причинил тебе боль 🥺',
    'Ты заслуживаешь только улыбок 🌸',
    'Я очень дорожу тобой 💞',
    'Спасибо, что ты есть в моей жизни 💋',
    'Давай начнём всё с чистого листа? 💕'
  ];
  let idx = 0;
  const secret = document.getElementById('secret');
  const btn = document.getElementById('loveBtn');

  btn.addEventListener('click', () => {
    secret.classList.remove('show');
    setTimeout(() => {
      secret.textContent = messages[idx % messages.length];
      secret.classList.add('show');
      idx++;
    }, 150);
    // Взрыв поцелуев при клике
    for (let i = 0; i < 16; i++) {
      setTimeout(() => spawn(Math.random() < 0.55), i * 50);
    }
  });
</script>
</body>
</html>
